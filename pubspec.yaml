version: 0.1.0
homepage: https://github.com/Kasway-Tech/kaspa_sdk
repository: https://github.com/Kasway-Tech/kaspa_sdk
topics:
  - kaspa
  - cryptocurrency
  - blockchain
  - wallet

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
