name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── Runs on main push: creates the vX.Y.Z tag via PAT so the publish
  #    job is triggered as a real tag-push event (GITHUB_TOKEN cannot do this).
  tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          echo "value=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (if new)
        env:
          TAG: ${{ steps.version.outputs.value }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping."
          else
            git tag "$TAG"
            git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }} "$TAG"
            echo "Created and pushed tag $TAG."
          fi

  # ── Runs on tag push: validates and publishes to pub.dev.
  #    The OIDC ref is refs/tags/vX.Y.Z, satisfying pub.dev's tag pattern.
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze
      - run: dart test
      - name: Publish to pub.dev
        run: dart pub publish --force
